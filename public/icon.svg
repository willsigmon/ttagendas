<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#59BFEF"/>
      <stop offset="100%" stop-color="#2A9CD4"/>
    </linearGradient>
  </defs>

  <!-- Brand-blue rounded square with subtle gradient -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#g)"/>

  <!-- Top highlight stripe for depth -->
  <path d="M 112 0 H 400 A 112 112 0 0 1 512 112 V 220 H 0 V 112 A 112 112 0 0 1 112 0 Z"
        fill="#FFFFFF" fill-opacity="0.10"/>

  <!-- Wordmark: lowercase 'tt°' rendered as real text. Rsvg falls back to
       the system sans-serif if Poppins isn't installed; either way it
       reads as letters, not crosses. -->
  <text x="256" y="364"
        text-anchor="middle"
        font-family="Poppins, 'Helvetica Neue', 'Arial Black', sans-serif"
        font-weight="900"
        font-size="320"
        letter-spacing="-12"
        fill="#FFFFFF">tt</text>

  <!-- Brand-green ° to the right of 'tt' -->
  <circle cx="404" cy="148" r="36" fill="#6BBE5A"/>
  <circle cx="404" cy="148" r="14" fill="url(#g)"/>
</svg>
